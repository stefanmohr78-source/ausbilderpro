<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AusbilderPro – VerwaltungPro – AzubiPro</title>
<link rel="manifest" href="manifest-ag.json">
<meta name="theme-color" content="#1e2230">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ArbeitgeberPro">
<link rel="apple-touch-icon" href="icon-ag-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#f0f2f8;--sur:#fff;--sur2:#f5f6fa;--brd:#c4cce0;--tx:#0f172a;--mu:#475569;--acc:#2563eb;--ok:#16a34a;--bad:#dc2626;--warn:#d97706;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:#fff;border:2px solid var(--brd);border-radius:18px;padding:40px 36px;width:100%;max-width:360px;box-shadow:0 24px 80px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:stretch;}
.login-logo{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:4px;color:var(--tx);}
.login-logo span{color:#1e3a5f}
.login-sub{font-size:.72rem;color:var(--mu);text-align:center;font-family:'JetBrains Mono',monospace;margin-bottom:28px;}
.fi{width:100%;background:#fff;border:2px solid var(--brd);border-radius:9px;padding:11px 14px;color:var(--tx);font-family:'Sora',sans-serif;font-size:.85rem;outline:none;transition:border .15s;}
.fi:focus{border-color:var(--acc);}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.fl{font-size:.72rem;color:var(--mu);font-weight:600;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;border-radius:9px;color:#fff;font-family:'Sora',sans-serif;font-size:.87rem;font-weight:700;cursor:pointer;transition:all .15s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(59,130,246,.35);}
.err{color:var(--bad);font-size:.72rem;text-align:center;min-height:18px;}
.hdr{display:flex;align-items:center;gap:14px;padding:0 20px;height:54px;background:#64748b;border-bottom:2px solid #94a3b8;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.hdr-logo{font-size:1rem;font-weight:800;color:#fff;}.hdr-logo span{color:#1e3a5f;}
.hdr-firma{font-size:.72rem;color:rgba(255,255,255,.7);font-family:'JetBrains Mono',monospace;margin-left:auto;}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:7px;color:#fff;font-family:'Sora',sans-serif;font-size:.72rem;padding:6px 12px;cursor:pointer;transition:all .12s;}
.hdr-btn:hover{border-color:#fff;background:rgba(255,255,255,.25);}
.main{padding:20px;max-width:900px;margin:0 auto;}
.page-title{font-size:1.3rem;font-weight:800;margin-bottom:4px;}
.page-sub{font-size:.72rem;color:var(--mu);margin-bottom:18px;}
.card{background:#fff;border:2px solid var(--brd);border-radius:13px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-title{font-size:.82rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.stat-card{background:#fff;border:2px solid var(--brd);border-radius:13px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat-num{font-size:1.8rem;font-weight:800;color:var(--acc);font-family:'JetBrains Mono',monospace;}
.stat-label{font-size:.65rem;color:var(--mu);font-weight:600;margin-top:2px;}
.azubi-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:2px solid var(--brd);border-radius:10px;margin-bottom:8px;transition:border .12s;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.azubi-card:hover{border-color:var(--acc);}
.azubi-card.expanded{border-color:var(--acc);background:var(--sur2);}
.azubi-av{width:40px;height:40px;border-radius:50%;background:rgba(37,99,235,.1);border:2px solid rgba(37,99,235,.25);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:800;color:var(--acc);flex-shrink:0;overflow:hidden;}
.azubi-av img{width:100%;height:100%;object-fit:cover;}
.azubi-info{flex:1;min-width:0;}
.azubi-name{font-size:.88rem;font-weight:700;}
.azubi-sub{font-size:.68rem;color:var(--mu);}
.azubi-badge{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;}
.kurs-box{background:var(--sur2);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-top:10px;}
.kurs-name{font-size:.85rem;font-weight:800;margin-bottom:4px;}
.kurs-meta{font-size:.68rem;color:var(--mu);font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
.kurs-field{display:flex;align-items:baseline;gap:8px;padding:4px 0;font-size:.75rem;}
.kurs-field-label{color:var(--mu);font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;min-width:80px;font-family:'JetBrains Mono',monospace;}
.att-bar{display:flex;gap:2px;margin:8px 0;height:18px;border-radius:4px;overflow:hidden;}
.att-seg{min-width:2px;}
.att-summary{font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--mu);display:flex;gap:10px;flex-wrap:wrap;}
.att-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;}
.toast{position:fixed;bottom:20px;right:20px;background:#fff;border:2px solid var(--ok);border-radius:10px;padding:12px 18px;font-size:.8rem;font-weight:600;color:var(--ok);z-index:999;transform:translateY(60px);opacity:0;transition:all .25s;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.toast.show{transform:none;opacity:1;}.toast.bad{border-color:var(--bad);color:var(--bad);}
.empty{color:var(--mu);font-size:.78rem;text-align:center;padding:30px 12px;font-family:'JetBrains Mono',monospace;}
.copyright{position:fixed;bottom:8px;right:12px;font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--mu);opacity:.45;}
@media(max-width:600px){.stat-row{grid-template-columns:1fr;}.hdr{padding:0 12px;gap:8px;}.hdr-logo{font-size:.88rem;}.main{padding:14px 10px;}}
</style>
</head>
<body>
<div id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Arbeitgeber<span>Pro</span></div>
    <div class="login-sub">Ausbildungsportal für Betriebe</div>
    <div class="fg"><label class="fl">E-Mail</label><input class="fi" type="email" id="lEmail" placeholder="name@firma.de"></div>
    <div class="fg"><label class="fl">Passwort</label><input class="fi" type="password" id="lPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="err" id="lErr"></div>
    <button class="btn" onclick="doLogin()" style="margin-top:8px">Anmelden</button>
    <button class="btn" onclick="doReset()" style="background:#fff;border:1px solid var(--brd);box-shadow:none;color:var(--mu);font-size:.72rem;padding:8px;margin-top:6px">Passwort vergessen</button>
  </div>
</div>
<div id="appWrap" style="display:none">
  <div class="hdr">
    <div class="hdr-logo">Arbeitgeber<span>Pro</span></div>
    <div class="hdr-firma" id="hdrFirma"></div>
    <button class="hdr-btn" onclick="doLogout()">⎋ Abmelden</button>
  </div>
  <div class="main">
    <div class="page-title" id="welcomeTitle">Willkommen</div>
    <div class="page-sub" id="welcomeSub"></div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num" id="statAzubis">–</div><div class="stat-label">Auszubildende</div></div>
      <div class="stat-card"><div class="stat-num" id="statAktiv">–</div><div class="stat-label">In Lehrgängen</div></div>
      <div class="stat-card"><div class="stat-num" id="statAnw">–</div><div class="stat-label">⌀ Anwesenheit</div></div>
    </div>
    <div class="card">
      <div class="card-title">👥 Ihre Auszubildenden</div>
      <div id="azubiList"><div class="empty">Lädt…</div></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<div class="copyright">© ArbeitgeberPro v1.0.0 ─ by Stefan Mohr</div>
